title: Privacy Manifesto
description: >-
  Blog Jekyll minimal et propre, prêt pour GitHub Pages.
baseurl: "/privacy-manifesto"
url: "https://404loopback.github.io"
lang: fr
timezone: Europe/Paris

remote_theme: b2a3e8/jekyll-theme-console

markdown: kramdown
kramdown:
  input: GFM

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed

header_pages:
  - index.md
  - about.md

style: dark
listen_for_clients_preferred_style: true
footer: "© Privacy Manifesto"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page
